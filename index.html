<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>RUANG CERITA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap"
    rel="stylesheet"
>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="header modern-header">

    <div class="dekorasi-header dekorasi-satu"></div>
    <div class="dekorasi-header dekorasi-dua"></div>

    <div class="container header-content">

        <div class="brand-area">

            <div class="logo-ruang-cerita">
                <span>RC</span>
            </div>

            <div class="brand-text">
                <p class="header-label">Galih & Wisye Writing Space</p>

                <h1>Ruang Cerita</h1>

                <p class="header-description">
                    Tempat sederhana untuk menyimpan cerita,
                    pemikiran, dan pengalaman kita.
                </p>
            </div>
        <button 
        id="logoutButton"
    class="logout-button"
    type="button"
>
    🔒 Keluar
</button>

        </div>

        <!-- Pemutar musik -->
<div class="music-area">

    <div class="music-player">

        <p class="music-caption">
            Musik untuk menemani menulis
        </p>

        <p id="musicTitle" class="music-title">
            Memuat lagu...
        </p>

        <div class="music-controls">

            <button
                type="button"
                id="prevMusic"
                class="music-control-button"
                aria-label="Lagu sebelumnya"
                title="Lagu sebelumnya"
            >
                ⏮
            </button>

            <button
                type="button"
                id="musicToggle"
                class="music-button"
                aria-label="Putar atau jeda musik"
            >
                <span id="musicIcon" class="music-icon">
                    ▶
                </span>

                <span id="musicText">
                    Putar
                </span>
            </button>

            <button
                type="button"
                id="nextMusic"
                class="music-control-button"
                aria-label="Lagu berikutnya"
                title="Lagu berikutnya"
            >
                ⏭
            </button>

        </div>

        <select
            id="musicSelect"
            class="music-select"
            aria-label="Pilih lagu"
        >
            <!-- Pilihan lagu dibuat oleh musik.js -->
        </select>

        <label class="volume-control">

            <span>Volume</span>

            <input
                type="range"
                id="musicVolume"
                min="0"
                max="1"
                step="0.05"
                value="0.35"
                aria-label="Volume musik"
            >

        </label>

    </div>

    <audio
        id="backgroundMusic"
        preload="metadata"
    ></audio>

</div>

</header>

    <main class="container">

        <!-- Form menulis cerita -->
        <section class="form-section">
            <h2>Tulis Cerita Baru</h2>

            <form id="formTulisan">

                <div class="form-group">
                    <label for="judul">
                        Judul tulisan
                    </label>

                    <input
                        type="text"
                        id="judul"
                        placeholder="Masukkan judul tulisan"
                        required
                    >
                </div>

                <div class="form-grid-dua">
                    <div class="form-group">
                        <label for="kategori">
                            Kategori cerita
                        </label>

                        <select id="kategori" required>
                            <option value="">Pilih kategori</option>
                            <option value="Kenangan">Kenangan</option>
                            <option value="Perjalanan">Perjalanan</option>
                            <option value="Tentang Kita">Tentang Kita</option>
                            <option value="Keluarga">Keluarga</option>
                            <option value="Pekerjaan">Pekerjaan</option>
                            <option value="Harapan">Harapan</option>
                            <option value="Lainnya">Lainnya</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="mood">
                            Mood saat menulis
                        </label>

                        <select id="mood" required>
                            <option value="">Pilih mood</option>
                            <option value="Bahagia">😊 Bahagia</option>
                            <option value="Penuh Cinta">❤️ Penuh Cinta</option>
                            <option value="Terharu">🥺 Terharu</option>
                            <option value="Sedih">😔 Sedih</option>
                            <option value="Bersyukur">🌱 Bersyukur</option>
                            <option value="Tenang">😌 Tenang</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="isi">
                        Isi tulisan
                    </label>

                    <textarea
                        id="isi"
                        rows="12"
                        placeholder="Mulailah menulis ceritamu di sini..."
                        required
                    ></textarea>
                </div>

                <button type="submit" class="btn-simpan">
                    Simpan Tulisan
                </button>

            </form>
        </section>

        <!-- Daftar tulisan -->
        <section class="daftar-section">

            <div class="judul-daftar">
                <div>
                    <h2>Tulisan Tersimpan</h2>
                    <p id="jumlahTulisan" aria-live="polite">0 tulisan</p>
                </div>
            </div>

            <div class="daftar-tools">
                <div class="pencarian-cerita">
                    <label for="pencarianJudul">Cari judul cerita</label>

                    <div class="pencarian-input-wrapper">
                        <span class="ikon-pencarian" aria-hidden="true">⌕</span>

                        <input
                            type="search"
                            id="pencarianJudul"
                            placeholder="Ketik judul yang ingin dicari..."
                            autocomplete="off"
                        >

                        <button
                            type="button"
                            id="hapusPencarian"
                            class="hapus-pencarian"
                            aria-label="Hapus pencarian"
                            title="Hapus pencarian"
                            hidden
                        >
                            ×
                        </button>
                    </div>
                </div>

                <div class="filter-grid">
                    <div class="filter-control">
                        <label for="filterFavorit">Status</label>
                        <select id="filterFavorit">
                            <option value="semua">Semua cerita</option>
                            <option value="favorit">Favorit saja</option>
                        </select>
                    </div>

                    <div class="filter-control">
                        <label for="filterKategori">Kategori</label>
                        <select id="filterKategori">
                            <option value="semua">Semua kategori</option>
                            <option value="Kenangan">Kenangan</option>
                            <option value="Perjalanan">Perjalanan</option>
                            <option value="Tentang Kita">Tentang Kita</option>
                            <option value="Keluarga">Keluarga</option>
                            <option value="Pekerjaan">Pekerjaan</option>
                            <option value="Harapan">Harapan</option>
                            <option value="Lainnya">Lainnya</option>
                            <option value="Belum dikategorikan">Belum dikategorikan</option>
                        </select>
                    </div>

                    <div class="filter-control">
                        <label for="filterMood">Mood</label>
                        <select id="filterMood">
                            <option value="semua">Semua mood</option>
                            <option value="Bahagia">😊 Bahagia</option>
                            <option value="Penuh Cinta">❤️ Penuh Cinta</option>
                            <option value="Terharu">🥺 Terharu</option>
                            <option value="Sedih">😔 Sedih</option>
                            <option value="Bersyukur">🌱 Bersyukur</option>
                            <option value="Tenang">😌 Tenang</option>
                            <option value="Belum dipilih">Belum dipilih</option>
                        </select>
                    </div>

                    <div class="filter-control">
                        <label for="urutkanCerita">Urutkan</label>
                        <select id="urutkanCerita">
                            <option value="terbaru">Terbaru</option>
                            <option value="terlama">Terlama</option>
                            <option value="terakhir-diedit">Terakhir diedit</option>
                            <option value="judul-az">Judul A–Z</option>
                        </select>
                    </div>
                </div>

                <div class="baris-info-filter">
                    <p
                        id="infoHasilPencarian"
                        class="info-hasil-pencarian"
                        aria-live="polite"
                    ></p>

                    <button
                        type="button"
                        id="resetFilter"
                        class="reset-filter"
                    >
                        Reset filter
                    </button>
                </div>
            </div>

            <div
                id="daftarTulisan"
                class="daftar-tulisan"
            >
                <!-- Daftar tulisan ditampilkan melalui JavaScript -->
            </div>

            <nav
                id="paginasiTulisan"
                class="paginasi-tulisan"
                aria-label="Navigasi halaman cerita"
                hidden
            >
                <button
                    type="button"
                    id="halamanSebelumnya"
                    class="tombol-paginasi tombol-paginasi-arah"
                >
                    ← Sebelumnya
                </button>

                <div
                    id="nomorHalaman"
                    class="nomor-halaman"
                    aria-label="Nomor halaman"
                ></div>

                <button
                    type="button"
                    id="halamanBerikutnya"
                    class="tombol-paginasi tombol-paginasi-arah"
                >
                    Berikutnya →
                </button>
            </nav>

        </section>

    </main>

<!-- Library Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- Konfigurasi koneksi Supabase -->
<script src="supabase-config.js"></script>

<!-- Sistem penyimpanan tulisan -->
<script src="script.js"></script>

<!-- Pemutar musik -->
<script src="musik.js"></script>

</body>
</html>
