<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>Edit Tulisan - Ruang Cerita</title>


<link rel="stylesheet" href="style.css">


<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>


<link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@600;700&display=swap"
    rel="stylesheet"
>


</head>


<body>


<header class="header modern-header">


<div class="container header-content">


<div class="brand-area">


<div class="logo-ruang-cerita">

<span>
RC
</span>

</div>



<div class="brand-text">


<p class="header-label">
Personal Writing Space
</p>


<h1>
Edit Cerita
</h1>


<p class="header-description">
Perbaiki kembali cerita yang telah kamu simpan.
</p>


</div>


</div>


</div>


</header>





<main class="container">


<section class="form-section">


<h2>
✎ Edit Tulisan
</h2>



<form id="formEdit">


<div class="form-group">

<label for="editJudul">
Judul tulisan
</label>


<input
id="editJudul"
type="text"
required
>


</div>


<div class="form-grid-dua">

<div class="form-group">
<label for="editKategori">Kategori cerita</label>
<select id="editKategori" required>
<option value="">Pilih kategori</option>
<option value="Kenangan">Kenangan</option>
<option value="Perjalanan">Perjalanan</option>
<option value="Tentang Kita">Tentang Kita</option>
<option value="Keluarga">Keluarga</option>
<option value="Pekerjaan">Pekerjaan</option>
<option value="Harapan">Harapan</option>
<option value="Lainnya">Lainnya</option>
</select>
</div>

<div class="form-group">
<label for="editMood">Mood cerita</label>
<select id="editMood" required>
<option value="">Pilih mood</option>
<option value="Bahagia">😊 Bahagia</option>
<option value="Penuh Cinta">❤️ Penuh Cinta</option>
<option value="Terharu">🥺 Terharu</option>
<option value="Sedih">😔 Sedih</option>
<option value="Bersyukur">🌱 Bersyukur</option>
<option value="Tenang">😌 Tenang</option>
</select>
</div>

</div>


<div class="form-group">


<label for="editIsi">
Isi tulisan
</label>


<textarea
id="editIsi"
rows="15"
required
></textarea>


</div>





<div id="infoEdit">

</div>





<button
class="btn-simpan"
type="submit"
>
Simpan Perubahan
</button>



<a
href="index.html"
class="btn-kembali"
>
← Kembali
</a>


</form>


</section>


</main>





<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="supabase-config.js"></script>

<script src="edit.js"></script>



</body>

</html>
