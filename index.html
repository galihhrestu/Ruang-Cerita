<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>RUANG CERITA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap"
    rel="stylesheet"
>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="header modern-header">

    <div class="dekorasi-header dekorasi-satu"></div>
    <div class="dekorasi-header dekorasi-dua"></div>

    <div class="container header-content">

        <div class="brand-area">

            <div class="logo-ruang-cerita">
                <span>RC</span>
            </div>

            <div class="brand-text">
                <p class="header-label">Galih & Wisye Writing Space</p>

                <h1>Ruang Cerita</h1>

                <p class="header-description">
                    Tempat sederhana untuk menyimpan cerita,
                    pemikiran, dan pengalaman kita.
                </p>
            </div>

        </div>

        <div class="music-area">

            <button
                type="button"
                id="musicToggle"
                class="music-button"
                aria-label="Putar atau jeda musik"
            >
                <span id="musicIcon" class="music-icon">▶</span>
                <span id="musicText">Putar Musik</span>
            </button>

            <p class="music-caption">
                Musik untuk menemani menulis
            </p>

        </div>

        <audio
            id="backgroundMusic"
            loop
            preload="metadata"
        >
            <source src="musik.mp3" type="audio/mpeg">
        </audio>

    </div>

</header>

    <main class="container">

        <!-- Form menulis cerita -->
        <section class="form-section">
            <h2>Tulis Cerita Baru</h2>

            <form id="formTulisan">

                <div class="form-group">
                    <label for="judul">
                        Judul tulisan
                    </label>

                    <input
                        type="text"
                        id="judul"
                        placeholder="Masukkan judul tulisan"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="isi">
                        Isi tulisan
                    </label>

                    <textarea
                        id="isi"
                        rows="12"
                        placeholder="Mulailah menulis ceritamu di sini..."
                        required
                    ></textarea>
                </div>

                <button type="submit" class="btn-simpan">
                    Simpan Tulisan
                </button>

            </form>
        </section>

        <!-- Daftar tulisan -->
        <section class="daftar-section">

            <div class="judul-daftar">
                <div>
                    <h2>Tulisan Tersimpan</h2>
                    <p id="jumlahTulisan">0 tulisan</p>
                </div>
            </div>

            <div
                id="daftarTulisan"
                class="daftar-tulisan"
            >
                <!-- Daftar tulisan ditampilkan melalui JavaScript -->
            </div>

        </section>

    </main>

    <script src="script.js"></script>
<script src="musik.js"></script>

</body>
</html>
