<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Detail Tulisan - Ruang Cerita</title>

    <!-- Font modern dan estetik -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap"
        rel="stylesheet"
    >

    <!-- Menghubungkan ke file CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Bagian atas website -->
    <header class="header modern-header">

        <!-- Ornamen latar header -->
        <div class="dekorasi-header dekorasi-satu"></div>
        <div class="dekorasi-header dekorasi-dua"></div>

        <div class="container header-content">

            <!-- Logo dan nama website -->
            <div class="brand-area">

                <div class="logo-ruang-cerita">
                    <span>RC</span>
                </div>

                <div class="brand-text">

                    <p class="header-label">
                        Personal Writing Space
                    </p>

                    <h1>Ruang Cerita</h1>

                    <p class="header-description">
                        Baca kembali cerita, pemikiran,
                        dan pengalaman yang telah kamu simpan.
                    </p>
                    <button 
    id="logoutButton"
    class="logout-button"
    type="button"
>
    🔒 Keluar
</button>

                </div>

            </div>

            <!-- Tombol musik -->
            <!-- Pemutar musik -->
<div class="music-area">

    <div class="music-player">

        <p class="music-caption">
            Musik untuk menemani membaca
        </p>

        <p id="musicTitle" class="music-title">
            Memuat lagu...
        </p>

        <div class="music-controls">

            <button
                type="button"
                id="prevMusic"
                class="music-control-button"
                aria-label="Lagu sebelumnya"
                title="Lagu sebelumnya"
            >
                ⏮
            </button>

            <button
                type="button"
                id="musicToggle"
                class="music-button"
                aria-label="Putar atau jeda musik"
            >
                <span id="musicIcon" class="music-icon">
                    ▶
                </span>

                <span id="musicText">
                    Putar
                </span>
            </button>

            <button
                type="button"
                id="nextMusic"
                class="music-control-button"
                aria-label="Lagu berikutnya"
                title="Lagu berikutnya"
            >
                ⏭
            </button>

        </div>

        <select
            id="musicSelect"
            class="music-select"
            aria-label="Pilih lagu"
        >
            <!-- Pilihan lagu dibuat oleh musik.js -->
        </select>

        <label class="volume-control">

            <span>Volume</span>

            <input
                type="range"
                id="musicVolume"
                min="0"
                max="1"
                step="0.05"
                value="0.35"
                aria-label="Volume musik"
            >

        </label>

    </div>

    <audio
        id="backgroundMusic"
        preload="metadata"
    ></audio>

</div>

        </div>

    </header>

    <!-- Isi utama halaman -->
    <main class="container">

        <section class="detail-section">

            <!-- Tombol kembali -->
            <a
                href="index.html"
                class="btn-kembali"
            >
                ← Kembali ke Daftar Tulisan
            </a>

            <!-- Tempat isi tulisan ditampilkan -->
            <article
                id="detailTulisan"
                class="detail-tulisan"
            >
                <p class="status-detail">
                    Sedang membuka tulisan...
                </p>
            </article>

        </section>

    </main>

    <!-- Library Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- Konfigurasi koneksi Supabase -->
<script src="supabase-config.js"></script>

<!-- Sistem detail tulisan -->
<script src="detail.js"></script>

<!-- Pemutar musik -->
<script src="musik.js"></script>

</body>
</html>
